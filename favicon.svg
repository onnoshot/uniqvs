<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Left antenna -->
  <line x1="31" y1="7" x2="45" y2="21" stroke="#CC1111" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Right antenna -->
  <line x1="69" y1="7" x2="55" y2="21" stroke="#CC1111" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Left wing -->
  <ellipse cx="26" cy="52" rx="23" ry="14" stroke="#CC1111" stroke-width="5" fill="white"/>
  <!-- Right wing -->
  <ellipse cx="74" cy="52" rx="23" ry="14" stroke="#CC1111" stroke-width="5" fill="white"/>
  <!-- Body trapezoid (covers inner wing area) -->
  <path d="M43,26 L36,69 L64,69 L57,26 Z" fill="#CC1111"/>
  <!-- A-interior white triangle -->
  <path d="M48,34 L42,57 L58,57 L52,34 Z" fill="white"/>
  <!-- White gap below A crossbar -->
  <rect x="37" y="61" width="26" height="4.5" fill="white"/>
  <!-- Bottom rounded segment -->
  <path d="M37,69 Q36,87 50,89 Q64,87 63,69 Z" fill="#CC1111"/>
  <!-- White stripe in bottom segment -->
  <rect x="41" y="77" width="18" height="4" rx="2" fill="white"/>
  <!-- Head circle (on top) -->
  <circle cx="50" cy="24" r="10.5" fill="#CC1111"/>
</svg>
